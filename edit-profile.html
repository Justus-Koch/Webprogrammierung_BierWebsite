<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Profil bearbeiten</title>
</head>
<body>
  <h1>Profil bearbeiten</h1>
  <main>
    <form method="post">
      <label for="nickname">Nickname:</label><br>
      <input type="text" id="nickname" name="nickname" value="Nickname"><br>
      <label for="profile_picture">Profilbild:</label><br>
      <input type="file" id="profile_picture" name="profile_picture">
      <img src="./img/profile_picture.jpg" alt="Profilbild" width="50"><br>
      <button type="submit">Speichern</button>
      <a href="./profile.html">Abbrechen</a>
    </form>
    <button type="submit">Profil löschen</button>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <a href="./impressum.html">Impressum</a>
      <a href="./datenschutz.html">Datenschutz</a>
      <a href="./nutzungsbedingungen.html">Nutzungsbedingungen</a>
      <a href="./barrierefreiheit.html">Barrierefreiheitserklärung</a>
    </div>
  </footer>
</body>
</html>
