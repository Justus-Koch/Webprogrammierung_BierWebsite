<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmeldung</title>
  <link href='https://fonts.googleapis.com/css?family=Chau+Philomene+One' rel='stylesheet'>
  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

<main>
  <section class="login-container">
    <h2>Anmeldung</h2>

    <form action="/login" method="POST">
      <div class="form-group">
        <label for="username">E-Mail:</label>
        <input id="username" name="username" required type="email" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Passwort:</label>
        <input id="password" name="password" required type="password" autocomplete="current-password">
      </div>

      <button type="submit">Einloggen</button>
      <a href="./registration.html" class="button-secondary">Registrieren</a>
      <a href="./index.html" class="button-secondary">Abbrechen</a>
    </form>
  </section>
</main>

<footer class="footer">
  <nav class="footer-content" aria-label="Sekundäre Navigation">
    <a href="./impressum.html">Impressum</a>
    <a href="./datenschutz.html">Datenschutz</a>
    <a href="./nutzungsbedingungen.html">Nutzungsbedingungen</a>
    <a href="./barrierefreiheit.html">Barrierefreiheitserklärung</a>
  </nav>
</footer>

</body>
</html>
