<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung</title>
  <link href='https://fonts.googleapis.com/css?family=Chau+Philomene+One' rel='stylesheet'>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/registration.css">
</head>
<body>
<main class="register-container">
  <h2>Neues Konto erstellen</h2>

  <form action="/register" method="POST">
    <div class="form-group">
      <label for="reg-email">E-Mail Adresse</label>
      <input id="reg-email" name="email" required type="email" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="reg-password">Passwort wählen</label>
      <input id="reg-password" name="password" required type="password" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label for="reg-password-confirm">Passwort bestätigen</label>
      <input id="reg-password-confirm" name="password_confirm" required type="password">
    </div>

    <div class="form-group">
      <label for="nickname">Spitzname</label>
      <input type="text" id="nickname" name="nickname">
    </div>

    <button type="submit">Jetzt registrieren</button>
    <a href="./login.html" class="button-secondary">Abbrechen</a>
  </form>
</main>

<footer class="footer">
  <div class="footer-content">
    <a href="./impressum.html">Impressum</a>
    <a href="./datenschutz.html">Datenschutz</a>
    <a href="./nutzungsbedingungen.html">Nutzungsbedingungen</a>
    <a href="./barrierefreiheit.html">Barrierefreiheitserklärung</a>
  </div>
</footer>

</body>
</html>
