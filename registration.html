<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body>

<main>
  <div class="form-card">
    <h1>Registrieren</h1>

    <form method="post" class="review-form">

      <div class="form-group">
        <label for="nickname">Nickname <span aria-hidden="true">*</span></label>
        <input type="text" id="nickname" name="nickname" placeholder="Dein Nickname" required aria-required="true">
      </div>

      <div class="form-group">
        <label for="email">E-Mail Adresse <span aria-hidden="true">*</span></label>
        <input type="text" id="email" name="email" placeholder="beispiel@mail.de" required aria-required="true">
      </div>

      <div class="form-group">
        <label for="password">Passwort <span aria-hidden="true">*</span></label>
        <input type="text" id="password" name="password" required aria-required="true">
      </div>

      <div class="form-group">
        <label for="password_confirm">Passwort bestätigen <span aria-hidden="true">*</span></label>
        <input type="text" id="password_confirm" name="password_confirm" required aria-required="true">
      </div>

      <div class="form-footer-actions">
        <div class="left-actions">
          <button type="submit" class="btn-submit">Konto erstellen</button>
          <a href="./login.html" class="button-secondary">Zum Login</a>
        </div>
      </div>

    </form>
  </div>
</main>

<footer class="footer">
  <div class="footer-content">
    <a href="./impressum.html">Impressum</a>
    <a href="./datenschutz.html">Datenschutz</a>
    <a href="./nutzungsbedingungen.html">Nutzungsbedingungen</a>
    <a href="./barrierefreiheit.html">Barrierefreiheitserklärung</a>
  </div>
</footer>

</body>
</html>
