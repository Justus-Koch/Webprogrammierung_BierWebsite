<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Registrierung</title>
</head>
<body>
<main class="register-container">
  <h2>Neues Konto erstellen</h2>

  <form action="/register" method="POST">
    <div class="form-group">
      <label for="email">E-Mail-Adresse</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="reg-password">Passwort wählen</label>
      <input type="password" id="reg-password" name="password" required>
    </div>

    <div class="form-group">
      <label for="password-confirm">Passwort bestätigen</label>
      <input type="password" id="password-confirm" name="password_confirm" required>
    </div>

    <div class="form-group">
      <label for="nickname">Spitzname</label>
      <input type="text" id="nickname" name="nickname">
    </div>

    <button type="submit">Jetzt registrieren</button>
    <a href="./login.html" class="button-secondary">Abbrechen</a>
  </form>
</main>

<footer class="footer">
  <div class="footer-content">
    <a href="./impressum.html">Impressum</a>
    <a href="./datenschutz.html">Datenschutz</a>
    <a href="./nutzungsbedingungen.html">Nutzungsbedingungen</a>
    <a href="./barrierefreiheit.html">Barrierefreiheitserklärung</a>
  </div>
</footer>

</body>
</html>
